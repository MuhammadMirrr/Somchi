<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #1a1a1a; }
.banner {
    width: 1024px;
    height: 500px;
    background: linear-gradient(135deg, #0C0A09 0%, #1C1917 40%, #0D9488 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
.bg-circle1 {
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(13,148,136,0.15) 0%, transparent 70%);
    top: -200px; right: -100px;
}
.bg-circle2 {
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(13,148,136,0.1) 0%, transparent 70%);
    bottom: -150px; left: -50px;
}
.grid {
    position: absolute;
    inset: 0;
    background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
}
.content {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 60px;
    padding: 0 80px;
}
.left { flex: 1; }
.logo-text {
    font-size: 72px;
    font-weight: 800;
    color: #FAFAF9;
    letter-spacing: -0.03em;
    margin-bottom: 12px;
}
.logo-accent { color: #2DD4BF; }
.tagline {
    font-size: 24px;
    color: #A8A29E;
    font-weight: 400;
    letter-spacing: -0.01em;
    line-height: 1.4;
}
.right { display: flex; gap: 20px; align-items: center; }
.rate-card {
    background: rgba(28,25,23,0.8);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 24px;
    min-width: 180px;
    backdrop-filter: blur(10px);
}
.rate-card.main {
    transform: scale(1.1);
    border-color: rgba(13,148,136,0.3);
    background: rgba(28,25,23,0.95);
}
.flag { font-size: 32px; margin-bottom: 8px; }
.code { font-size: 14px; color: #78716C; font-weight: 600; letter-spacing: 0.05em; }
.rate { font-size: 28px; font-weight: 700; color: #FAFAF9; margin: 4px 0; font-variant-numeric: tabular-nums; }
.diff-up { font-size: 14px; color: #10B981; font-weight: 500; }
.diff-down { font-size: 14px; color: #EF4444; font-weight: 500; }
</style>
</head>
<body>
<div class="banner">
    <div class="bg-circle1"></div>
    <div class="bg-circle2"></div>
    <div class="grid"></div>
    <div class="content">
        <div class="left">
            <div class="logo-text">Som<span class="logo-accent">chi</span></div>
            <div class="tagline">Valyuta kurslari<br>Markaziy Bank</div>
        </div>
        <div class="right">
            <div class="rate-card">
                <div class="flag">&#x1F1EA;&#x1F1FA;</div>
                <div class="code">EUR</div>
                <div class="rate">14 230</div>
                <div class="diff-up">&#9650; +52.40</div>
            </div>
            <div class="rate-card main">
                <div class="flag">&#x1F1FA;&#x1F1F8;</div>
                <div class="code">USD</div>
                <div class="rate">12 950</div>
                <div class="diff-up">&#9650; +15.20</div>
            </div>
            <div class="rate-card">
                <div class="flag">&#x1F1F7;&#x1F1FA;</div>
                <div class="code">RUB</div>
                <div class="rate">148.50</div>
                <div class="diff-down">&#9660; -1.30</div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
