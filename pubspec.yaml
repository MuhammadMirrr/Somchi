name: somchi
description: "Somchi — O'zbekiston so'mi uchun valyuta kurslari ilovasi"
publish_to: 'none'

version: 1.2.0+3

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.0
  fl_chart: ^0.70.2
  shared_preferences: ^2.3.0
  google_fonts: ^6.2.1
  intl: ^0.20.2
  provider: ^6.1.2
  google_mobile_ads: ^5.3.0
  shimmer: ^3.0.0
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#FAFAF9"
  adaptive_icon_foreground: "assets/images/logo.png"
  web:
    generate: true
    image_path: "assets/images/logo.png"
    background_color: "#FAFAF9"
    theme_color: "#0D9488"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
